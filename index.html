<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>liveSEO Champions League</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F0A500;
    --gold-dim: #7a5200;
    --silver: #B0B0B0;
    --bronze: #CD7F32;
    --bg: #080808;
    --surface: #101010;
    --surface2: #181818;
    --border: #232323;
    --text: #e8e8e8;
    --muted: #555;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(240,165,0,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .logo { width: 72px; height: 72px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(240,165,0,0.35)); }
  .header-text {}
  .header-title { font-family: var(--font-display); font-size: 2.4rem; letter-spacing: 0.04em; line-height: 1; color: var(--gold); }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .header-right { margin-left: auto; text-align: right; }
  .update-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .tab {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 20px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--text); border-color: #444; }
  .tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 500; }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── PODIUM ── */
  .podium {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
  }
  .podium-slot { flex: 1; display: flex; flex-direction: column; }
  .podium-slot.first  { order: 2; padding-top: 0; }
  .podium-slot.second { order: 1; padding-top: 40px; }
  .podium-slot.third  { order: 3; padding-top: 60px; }

  .podium-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .podium-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .podium-card.gold { border-color: rgba(240,165,0,0.5); }
  .podium-card.gold::before { background: var(--gold); }
  .podium-card.silver { border-color: rgba(176,176,176,0.3); }
  .podium-card.silver::before { background: var(--silver); }
  .podium-card.bronze { border-color: rgba(205,127,50,0.3); }
  .podium-card.bronze::before { background: var(--bronze); }

  /* Degrau — oculto, altura controlada por padding-top no slot */
  .podium-step { display: none; }

  /* Medalha SVG */
  .podium-medal { width: 38px; height: 38px; margin: 0 auto 6px; display: block; }

  .podium-pos { font-family: var(--font-display); font-size: 2rem; line-height: 1; }
  .podium-pos.gold { color: var(--gold); }
  .podium-pos.silver { color: var(--silver); }
  .podium-pos.bronze { color: var(--bronze); }
  .podium-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
    margin: 6px auto 6px;
  }
  .podium-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .podium-group { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .podium-score { font-family: var(--font-display); font-size: 1.6rem; color: var(--gold); margin-top: 8px; line-height: 1; }
  .podium-score-label { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

  /* ── RANK LIST ── */
  .rank-list { display: flex; flex-direction: column; gap: 5px; }
  .rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    transition: border-color 0.18s, background 0.18s;
  }
  .rank-item:hover { border-color: #333; background: var(--surface2); }
  .rank-num { font-family: var(--font-display); font-size: 1.1rem; min-width: 24px; color: var(--muted); }
  .rank-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .rank-name { flex: 1; font-size: 13px; color: var(--text); }
  .rank-group { font-size: 11px; color: var(--muted); }
  .bar-wrap { width: 60px; height: 3px; background: #1e1e1e; border-radius: 2px; }
  .bar { height: 3px; border-radius: 2px; background: var(--gold); opacity: 0.7; }
  .rank-score { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); min-width: 32px; text-align: right; }

  /* ── TIMES GRID ── */
  .times-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .time-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.18s;
    position: relative;
    overflow: hidden;
  }
  .time-card.gold { border-color: rgba(240,165,0,0.4); }
  .time-card.silver { border-color: rgba(176,176,176,0.25); }
  .time-card.bronze { border-color: rgba(205,127,50,0.3); }
  .time-pos { font-family: var(--font-display); font-size: 1.3rem; min-width: 28px; color: var(--muted); }
  .time-pos.gold { color: var(--gold); }
  .time-pos.silver { color: var(--silver); }
  .time-pos.bronze { color: var(--bronze); }
  .time-icon {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; flex-shrink: 0;
    background: #1a1a1a;
  }
  .time-info { flex: 1; }
  .time-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .time-members { font-size: 11px; color: var(--muted); }
  .time-bar-wrap { height: 2px; background: #1e1e1e; border-radius: 2px; margin-top: 4px; }
  .time-bar { height: 2px; border-radius: 2px; background: var(--gold); opacity: 0.65; }
  .time-score { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold); }

  /* ── FOOTER ── */
  .footer { margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-text { font-size: 11px; color: #333; }

  /* ── LOADING / ERROR ── */
  .state-msg { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 14px; }

  /* ── INFO / PONTUAÇÕES ── */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .pts-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .pts-label { font-size: 12px; color: var(--text); line-height: 1.4; flex: 1; }
  .pts-badge {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--gold);
    white-space: nowrap;
    min-width: 44px;
    text-align: right;
  }

  /* ── REGULAMENTO ── */
  .reg-body { display: flex; flex-direction: column; gap: 16px; }
  .reg-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .reg-section-title {
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 0.05em;
    color: var(--gold);
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface2);
  }
  .reg-section-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .reg-item { font-size: 12px; color: #bbb; line-height: 1.6; padding-left: 12px; border-left: 2px solid #2a2a2a; }
  .reg-item strong { color: var(--text); font-weight: 500; }
  .reg-contacts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .reg-contact-card {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #bbb;
  }
  .reg-contact-card strong { display: block; color: var(--text); margin-bottom: 2px; }

  /* ── RESPONSIVE ── */
  @media(max-width: 600px) {
    .header { flex-wrap: wrap; }
    .header-right { width: 100%; text-align: left; }
    .podium { grid-template-columns: 1fr; }
    .times-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

    <circle cx="19" cy="28" r="10" fill="${c.inner}"/>
    <text x="19" y="33" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="13" fill="${c.outer}">${c.num}</text>
  </svg>`;
}

function podiumCard(name, group, score, realIdx, isTeam) {
  const mc = medalClass(realIdx);
  const c = COLORS[realIdx % COLORS.length];
  const label = isTeam ? `${group} membros` : group;
  const avatar = isTeam ? name.slice(0,3) : initials(name);
  const slotClass = realIdx===0?'first':realIdx===1?'second':'third';
  return `<div class="podium-slot ${slotClass}">
    <div class="podium-card ${mc}">
      ${medalSVG(mc)}
      <div class="podium-avatar" style="background:${c.bg};color:${c.text};font-size:${isTeam?'12px':'14px'}">${avatar}</div>
      <div class="podium-name">${name}</div>
      <div class="podium-group">${label}</div>
      <div class="podium-score">${score}</div>
      <div class="podium-score-label">pontos</div>
    </div>
    <div class="podium-step"></div>
  </div>`;
}

function renderIndividual(data) {
  const top3 = data.slice(0,3);
  const rest = data.slice(3,10);
  const max = data[0]?.score || 1;

  document.getElementById('podium-individual').innerHTML = top3.map((p, i) =>
    podiumCard(p.name, p.group, p.score, i, false)
  ).join('');

  document.getElementById('list-individual').innerHTML = rest.map((p, i) => {
    const realIdx = i + 3;
    const c = COLORS[realIdx % COLORS.length];
    const pct = Math.round((p.score / max) * 100);
    return `<div class="rank-item">
      <span class="rank-num">${realIdx+1}</span>
      <div class="rank-avatar" style="background:${c.bg};color:${c.text}">${initials(p.name)}</div>
      <div style="flex:1">
        <div class="rank-name">${p.name}</div>
        <div class="rank-group">${p.group}</div>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <div class="rank-score">${p.score}</div>
    </div>`;
  }).join('');
}

function renderTimes(data) {
  const top3 = data.slice(0,3);
  const rest = data.slice(3,10);
  const max = data[0]?.score || 1;

  document.getElementById('podium-times').innerHTML = top3.map((t, i) =>
    podiumCard(t.name, String(t.members), t.score, i, true)
  ).join('');

  document.getElementById('list-times').innerHTML = rest.map((t, i) => {
    const realIdx = i + 3;
    const c = COLORS[realIdx % COLORS.length];
    const pct = Math.round((t.score / max) * 100);
    return `<div class="time-card">
      <div class="time-pos">${realIdx+1}</div>
      <div class="time-icon" style="color:${c.text}">${t.name.slice(0,3)}</div>
      <div class="time-info">
        <div class="time-name">${t.name}</div>
        <div class="time-members">${t.members} membros</div>
        <div class="time-bar-wrap"><div class="time-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="time-score">${t.score}</div>
    </div>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}
