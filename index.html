<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>liveSEO Champions League</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Saira+Condensed:wght@400;500;600;700&family=Saira:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F0A500;
    --gold-bright: #FFC83D;
    --silver: #C4C4C4;
    --bronze: #CD7F32;
    --bg: #060606;
    --surface: #111111;
    --surface2: #181818;
    --line: #262626;
    --text: #ECECEC;
    --muted: #6a6a6a;
    --display: 'Bebas Neue', sans-serif;
    --cond: 'Saira Condensed', sans-serif;
    --body: 'Saira', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── ARENA BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 90% 55% at 50% -10%, rgba(240,165,0,0.16) 0%, rgba(240,165,0,0.04) 35%, transparent 65%),
      repeating-linear-gradient(115deg, transparent 0 38px, rgba(255,255,255,0.018) 38px 39px);
  }
  /* feixe de holofote */
  body::after {
    content: '';
    position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
    width: 140vw; height: 60vh; z-index: 0; pointer-events: none;
    background: conic-gradient(from 180deg at 50% 0%, transparent 78deg, rgba(240,165,0,0.05) 90deg, transparent 102deg);
    filter: blur(6px);
  }

  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; gap: 1rem;
    padding-bottom: 1.25rem; margin-bottom: 1.75rem;
    border-bottom: 1px solid var(--line);
  }
  .logo { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 0 14px rgba(240,165,0,0.4)); }
  .header-title {
    font-family: var(--display); font-size: 2.6rem; line-height: 0.92;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 130%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .header-sub {
    font-family: var(--cond); font-size: 12px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
    margin-top: 3px;
  }
  .header-right { margin-left: auto; text-align: right; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--cond); font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 11px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ec27e; box-shadow: 0 0 8px #2ec27e; animation: pulse 1.8s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.35; transform:scale(0.8)} }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; margin-bottom: 1.75rem; border-bottom: 1px solid var(--line); }
  .tab {
    font-family: var(--cond); font-size: 14px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 11px 20px 13px; background: transparent; border: none;
    color: var(--muted); cursor: pointer; position: relative;
    transition: color 0.18s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); }
  .tab.active::after {
    content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px;
    background: var(--gold); box-shadow: 0 0 10px rgba(240,165,0,0.6);
  }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; animation: rise 0.3s ease; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

  .section-label {
    font-family: var(--cond); font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  /* ════════ PÓDIO ARENA ════════ */
  .arena {
    display: grid; grid-template-columns: 1fr 1.25fr 1fr;
    align-items: end; gap: 14px; margin-bottom: 30px;
    padding: 0 6px;
  }
  .spot { display: flex; flex-direction: column; align-items: center; }

  .athlete {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; padding-bottom: 14px;
  }
  .crown { font-size: 22px; line-height: 1; margin-bottom: 6px; filter: drop-shadow(0 0 8px rgba(240,165,0,0.7)); }
  .ath-avatar img, .r-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; object-position: center 25%; display: block; }
  .ath-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--cond); font-size: 19px; font-weight: 700;
    border: 2px solid; position: relative;
  }
  .spot-1 .ath-avatar { width: 70px; height: 70px; font-size: 24px; }
  .ath-name {
    font-family: var(--cond); font-weight: 600; font-size: 13.5px;
    text-align: center; line-height: 1.15; margin-top: 9px; color: var(--text);
    max-width: 130px;
  }
  .ath-team { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
  .ath-score { font-family: var(--display); font-size: 2rem; line-height: 0.9; margin-top: 8px; }
  .ath-score-lbl { font-family: var(--cond); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  /* degrau */
  .podium-block {
    width: 100%; border-radius: 8px 8px 0 0;
    position: relative; overflow: hidden;
    border: 1px solid var(--line); border-bottom: none;
    background: linear-gradient(180deg, var(--surface2), var(--surface));
  }
  .podium-block::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .podium-rank {
    font-family: var(--display); text-align: center; line-height: 1;
    width: 100%; opacity: 0.9;
  }
  .spot-1 .podium-block { height: 130px; }
  .spot-2 .podium-block { height: 96px; }
  .spot-3 .podium-block { height: 72px; }
  .spot-1 .podium-rank { font-size: 5.2rem; padding-top: 22px; }
  .spot-2 .podium-rank { font-size: 4rem; padding-top: 16px; }
  .spot-3 .podium-rank { font-size: 3.2rem; padding-top: 12px; }

  /* cores por posição */
  .spot-1 .ath-avatar { border-color: var(--gold); color: var(--gold); background: rgba(240,165,0,0.12); box-shadow: 0 0 22px rgba(240,165,0,0.35); }
  .spot-1 .ath-score { color: var(--gold); }
  .spot-1 .podium-block::before { background: var(--gold); box-shadow: 0 0 14px var(--gold); }
  .spot-1 .podium-rank { color: var(--gold); }

  .spot-2 .ath-avatar { border-color: var(--silver); color: var(--silver); background: rgba(196,196,196,0.08); }
  .spot-2 .ath-score { color: var(--silver); }
  .spot-2 .podium-block::before { background: var(--silver); }
  .spot-2 .podium-rank { color: var(--silver); }

  .spot-3 .ath-avatar { border-color: var(--bronze); color: var(--bronze); background: rgba(205,127,50,0.08); }
  .spot-3 .ath-score { color: var(--bronze); }
  .spot-3 .podium-block::before { background: var(--bronze); }
  .spot-3 .podium-rank { color: var(--bronze); }

  /* piso do pódio */
  .arena-floor { height: 8px; background: linear-gradient(180deg, var(--line), transparent); margin: -1px 6px 0; border-radius: 0 0 6px 6px; }

  /* ════════ TABELA RANKING ════════ */
  .standings { display: flex; flex-direction: column; }
  .standings-head {
    display: grid; grid-template-columns: 44px 1fr 70px 64px;
    gap: 12px; padding: 0 16px 8px; align-items: center;
    font-family: var(--cond); font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
  }
  .standings-head .h-score { text-align: right; }
  .row {
    display: grid; grid-template-columns: 44px 1fr 70px 64px;
    gap: 12px; align-items: center;
    padding: 11px 16px; border-bottom: 1px solid var(--line);
    position: relative; transition: background 0.15s;
  }
  .row:first-of-type { border-top: 1px solid var(--line); }
  .row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: transparent; transition: background 0.15s;
  }
  .row:hover { background: var(--surface2); }
  .row:hover::before { background: var(--gold); }
  .r-pos { font-family: var(--display); font-size: 1.7rem; color: var(--muted); line-height: 1; }
  .r-main { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .r-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--cond); font-size: 12px; font-weight: 600;
  }
  .r-name { font-family: var(--cond); font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .r-team { font-size: 11px; color: var(--muted); }
  .r-bar-wrap { height: 5px; background: #1c1c1c; border-radius: 3px; overflow: hidden; }
  .r-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
  .r-score { font-family: var(--display); font-size: 1.5rem; color: var(--gold); text-align: right; line-height: 1; }

  /* ════════ TIMES — BAR CHART RACE ════════ */
  .race { display: flex; flex-direction: column; gap: 9px; }
  .lane {
    display: grid; grid-template-columns: 40px 150px 1fr 56px;
    align-items: center; gap: 12px;
    padding: 9px 14px; border: 1px solid var(--line); border-radius: 9px;
    background: linear-gradient(180deg, var(--surface2), var(--surface));
    position: relative; overflow: hidden; transition: border-color 0.18s;
  }
  .lane:hover { border-color: #3a3a3a; }
  .lane.top1 { border-color: rgba(240,165,0,0.5); box-shadow: inset 0 0 24px rgba(240,165,0,0.07); }
  .lane.top1::after { content:''; position:absolute; inset:0; background: radial-gradient(circle at 0% 50%, rgba(240,165,0,0.12), transparent 55%); pointer-events:none; }
  .lane-pos { font-family: var(--display); font-size: 2rem; line-height: 1; color: var(--muted); text-align: center; }
  .lane.top1 .lane-pos { color: var(--gold); }
  .lane.top2 .lane-pos { color: var(--silver); }
  .lane.top3 .lane-pos { color: var(--bronze); }
  .lane-id { min-width: 0; }
  .lane-name { font-family: var(--cond); font-weight: 600; font-size: 15px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lane-members { font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }

  /* a pista */
  .track {
    position: relative; height: 30px; border-radius: 16px;
    background:
      repeating-linear-gradient(90deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 24px),
      #141414;
    overflow: visible;
    border: 1px solid #1f1f1f;
  }
  /* linha de chegada */
  .track::after {
    content: ''; position: absolute; top: 3px; bottom: 3px; right: 5px; width: 7px;
    background-image: repeating-linear-gradient(45deg, #555 0 3px, #222 3px 6px);
    border-radius: 2px; opacity: 0.55;
  }
  .runner {
    position: absolute; top: 2px; bottom: 2px; left: 0; width: 0;
    border-radius: 14px;
    background: linear-gradient(90deg, rgba(240,165,0,0.25), var(--gold) 85%);
    transition: width 1.1s cubic-bezier(.22,.61,.36,1);
    display: flex; align-items: center; justify-content: flex-end;
  }
  .lane.top1 .runner { background: linear-gradient(90deg, rgba(255,200,61,0.3), var(--gold-bright) 85%); box-shadow: 0 0 14px rgba(240,165,0,0.5); }
  .lane:not(.top1) .runner { opacity: 0.92; }
  .lane.top2 .runner { background: linear-gradient(90deg, rgba(196,196,196,0.2), var(--silver) 90%); }
  .lane.top3 .runner { background: linear-gradient(90deg, rgba(205,127,50,0.2), var(--bronze) 90%); }
  /* capacete na ponta */
  .helmet {
    width: 26px; height: 26px; margin-right: 2px; flex-shrink: 0;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }
  .lane-score { font-family: var(--display); font-size: 1.9rem; color: var(--gold); line-height: 1; text-align: right; }
  .lane.top2 .lane-score { color: #d8d8d8; }
  .lane.top3 .lane-score { color: var(--bronze); }

  /* ════════ PONTUAÇÕES ════════ */
  .pts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pts-card {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 15px; border: 1px solid var(--line); border-radius: 7px;
    background: var(--surface); transition: border-color 0.15s;
  }
  .pts-card:hover { border-color: rgba(240,165,0,0.35); }
  .pts-label { font-family: var(--cond); font-size: 13px; font-weight: 500; line-height: 1.35; color: var(--text); }
  .pts-badge { font-family: var(--display); font-size: 1.35rem; color: var(--gold); white-space: nowrap; min-width: 48px; text-align: right; }

  /* ════════ CATEGORIAS ════════ */
  .cat-filters {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px;
  }
  .cat-chip {
    font-family: var(--cond); font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em;
    padding: 7px 13px; border-radius: 20px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--muted); transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .cat-chip:hover { color: var(--text); border-color: #3a3a3a; }
  .cat-chip.active {
    background: rgba(240,165,0,0.12); border-color: var(--gold); color: var(--gold);
  }
  .cat-chip-count {
    font-family: var(--body); font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: inherit;
  }
  .cat-chip.active .cat-chip-count { background: rgba(240,165,0,0.2); }
  .cat-body { display: flex; flex-direction: column; gap: 18px; }
  .cat-empty { font-size: 13px; color: var(--muted); padding: 14px 4px; }
  .cat-card { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .cat-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--line);
  }
  .cat-title {
    font-family: var(--cond); font-size: 14px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold);
  }
  .cat-count {
    font-family: var(--cond); font-size: 10px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
  }
  .cat-list { display: flex; flex-direction: column; }
  .cat-row {
    display: grid; grid-template-columns: 30px 1fr 60px;
    gap: 12px; align-items: center;
    padding: 9px 16px; border-bottom: 1px solid var(--line);
    transition: background 0.15s;
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-row:hover { background: var(--surface2); }
  .cat-pos { font-family: var(--display); font-size: 1.3rem; color: var(--muted); line-height: 1; }
  .cat-row:nth-child(1) .cat-pos { color: var(--gold); }
  .cat-name-wrap { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .cat-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--cond); font-size: 11px; font-weight: 600;
    background: rgba(240,165,0,0.14); color: var(--gold);
  }
  .cat-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; object-position: center 25%; display: block; }
  .cat-name { font-family: var(--cond); font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-score { font-family: var(--display); font-size: 1.25rem; color: var(--gold); text-align: right; line-height: 1; }

  /* ════════ REGULAMENTO ════════ */
  .reg-body { display: flex; flex-direction: column; gap: 14px; }
  .reg-section { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .reg-title {
    font-family: var(--cond); font-size: 14px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold);
    padding: 13px 17px; background: var(--surface2); border-bottom: 1px solid var(--line);
  }
  .reg-inner { padding: 13px 17px; display: flex; flex-direction: column; gap: 9px; }
  .reg-item { font-size: 13px; color: #b3b3b3; line-height: 1.55; padding-left: 13px; border-left: 2px solid #2c2c2c; }
  .reg-item strong { color: var(--text); font-weight: 600; }
  .reg-contacts { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .reg-contact { background: var(--surface2); border: 1px solid var(--line); border-radius: 7px; padding: 9px 13px; font-size: 13px; color: #b3b3b3; }
  .reg-contact strong { display: block; color: var(--text); margin-bottom: 2px; font-family: var(--cond); font-weight: 600; }

  /* ── FOOTER ── */
  .footer { margin-top: 2.5rem; padding-top: 1.25rem; border-top: 1px solid var(--line); }
  .footer-text { font-family: var(--cond); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #383838; }

  /* ════════ RESPONSIVO ════════ */

  /* Tablet / telas médias */
  @media (max-width: 860px) {
    .page { padding: 1.75rem 1.1rem 3rem; }
    .header-title { font-size: 2.2rem; }
    .spot-1 .podium-block { height: 110px; }
    .spot-2 .podium-block { height: 82px; }
    .spot-3 .podium-block { height: 62px; }
    .spot-1 .podium-rank { font-size: 4.4rem; }
    .spot-2 .podium-rank { font-size: 3.4rem; }
    .spot-3 .podium-rank { font-size: 2.8rem; }
    .pts-grid { grid-template-columns: 1fr; }
  }

  /* Permite rolagem horizontal das abas se não couberem */
  @media (max-width: 640px) {
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 11px 15px 13px; white-space: nowrap; flex-shrink: 0; font-size: 13px; }
  }

  /* Celular */
  @media (max-width: 600px) {
    .page { padding: 1.5rem 0.9rem 2.5rem; }
    .header { gap: 0.75rem; }
    .logo { width: 48px; height: 48px; }
    .header-title { font-size: 1.9rem; }
    .header-sub { font-size: 10px; letter-spacing: 0.16em; }
    .header-right { width: 100%; margin-left: 0; text-align: left; margin-top: 4px; }
    .header { flex-wrap: wrap; }

    .arena { gap: 6px; padding: 0; }
    .crown { font-size: 17px; }
    .ath-avatar { width: 42px; height: 42px; font-size: 14px; border-width: 1.5px; }
    .spot-1 .ath-avatar { width: 54px; height: 54px; font-size: 18px; }
    .ath-name { font-size: 11.5px; max-width: 100%; }
    .ath-team { font-size: 10px; }
    .ath-score { font-size: 1.5rem; }
    .ath-score-lbl { font-size: 8px; }
    .spot-1 .podium-block { height: 92px; }
    .spot-2 .podium-block { height: 68px; }
    .spot-3 .podium-block { height: 52px; }
    .spot-1 .podium-rank { font-size: 3.6rem; padding-top: 14px; }
    .spot-2 .podium-rank { font-size: 2.8rem; padding-top: 12px; }
    .spot-3 .podium-rank { font-size: 2.3rem; padding-top: 10px; }

    .reg-contacts { grid-template-columns: 1fr; }

    /* corrida: pista vai pra linha de baixo, ocupando largura toda */
    .lane { grid-template-columns: 30px 1fr 46px; gap: 9px; padding: 9px 11px; }
    .lane-pos { grid-column: 1; grid-row: 1; }
    .lane-id { grid-column: 2; grid-row: 1; }
    .lane-score { grid-column: 3; grid-row: 1; }
    .lane .track { grid-column: 1 / -1; grid-row: 2; margin-top: 3px; height: 26px; }
    .lane-name { font-size: 13px; }
    .lane-pos { font-size: 1.7rem; }
    .lane-score { font-size: 1.6rem; }
    .helmet { width: 22px; height: 22px; }

    /* classificacao: esconde barra de progresso, mantem #, nome, pts */
    .standings-head, .row { grid-template-columns: 34px 1fr 48px; gap: 10px; }
    .standings-head .h-prog, .row .r-bar-wrap { display: none; }
    .r-name { font-size: 13px; }

    /* categorias */
    .cat-row { grid-template-columns: 26px 1fr 50px; gap: 10px; padding: 9px 12px; }
  }

  /* Celular estreito */

// tokeniza nome: sem acento, sem particulas, maiusculo
function fotoToks(nome){
  return String(nome).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^A-Za-z ]/g,' ').toUpperCase().trim().split(/\s+/)
    .filter(p => p && !['DE','DA','DO','DAS','DOS','E'].includes(p));
}
// indice em memoria
const FOTOS_IDX = FOTOS_LIST.map(r => ({ id: r.id, toks: fotoToks(r.n) }));
// cruza por: mesmo primeiro nome + ao menos uma outra palavra em comum
function fotoUrl(nome){
  const tp = fotoToks(nome);
  if (!tp.length) return null;
  const first = tp[0];
  const setp = new Set(tp);
  for (const r of FOTOS_IDX){
    if (r.toks[0] === first && r.toks.some(t => t !== first && setp.has(t))){
      return 'https://drive.google.com/thumbnail?id=' + r.id + '&sz=w200';
    }
  }
  return null;
}
function avatarHTML(nome){
  const url = fotoUrl(nome);
  const ini = initials(nome);
  if (url) {
    return `<img src="${url}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${ini}'}))">`;
  }
  return ini;
}

function titleCase(str) {
  const min = ['de','da','do','das','dos','e'];
  return String(str).toLowerCase().split(/(\s+|-)/).map((p,i) => {
    if (/^\s+$/.test(p) || p === '-') return p;
    if (i > 0 && min.includes(p)) return p;
    return p.charAt(0).toUpperCase() + p.slice(1);
  }).join('');
}
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(n=>n[0]).join('').toUpperCase(); }

function renderArena(data){
  // ordem visual: 2 (esq), 1 (centro), 3 (dir)
  const order = [1,0,2];
  const crowns = {0:'\u{1F451}'};
  document.getElementById('arena').innerHTML = order.map(idx => {
    const p = data[idx];
    if(!p) return '<div class="spot"></div>';
    const c = COLORS[idx % COLORS.length];
    const cls = 'spot spot-' + (idx+1);
    const crown = idx===0 ? '<div class="crown">\u{1F3C6}</div>' : '';
    return `<div class="${cls}">
      <div class="athlete">
        ${crown}
        <div class="ath-avatar">${avatarHTML(p.name)}</div>
        <div class="ath-name">${titleCase(p.name)}</div>
        <div class="ath-team">${p.group}</div>
        <div class="ath-score">${p.score}</div>
        <div class="ath-score-lbl">pontos</div>
      </div>
      <div class="podium-block"><div class="podium-rank">${idx+1}</div></div>
    </div>`;
  }).join('');
}

function renderStandings(data){
  const rest = data.slice(3,10);
  const max = data[0]?.score || 1;
  document.getElementById('standings-body').innerHTML = rest.map((p,i) => {
    const realIdx = i + 3;
    const c = COLORS[realIdx % COLORS.length];
    const pct = Math.round((p.score/max)*100);
    return `<div class="row">
      <span class="r-pos">${realIdx+1}</span>
      <div class="r-main">
        <div class="r-avatar" style="background:${c.bg};color:${c.text}">${avatarHTML(p.name)}</div>
        <div style="min-width:0">
          <div class="r-name">${titleCase(p.name)}</div>
          <div class="r-team">${p.group}</div>
        </div>
      </div>
      <div class="r-bar-wrap"><div class="r-bar" style="width:${pct}%"></div></div>
      <div class="r-score">${p.score}</div>
    </div>`;
  }).join('');
}

let _timesData = null, _raceAnimated = false;

function renderTimes(data){
  _timesData = data.slice(0,10);
  const max = _timesData[0]?.score || 1;
  document.getElementById('race').innerHTML = _timesData.map((t,i) => {
    const c = COLORS[i % COLORS.length];
    const top = i<3 ? ' top'+(i+1) : '';
    const nome = titleCase(t.name);
    return `<div class="lane${top}">
      <div class="lane-pos">${i+1}</div>
      <div class="lane-id">
        <div class="lane-name" style="color:${i<3?'':c.text}">${nome}</div>
        <div class="lane-members">${t.members} membros</div>
      </div>
      <div class="track"><div class="runner" data-pct="${Math.round((t.score/max)*100)}">${HELMET_SVG}</div></div>
      <div class="lane-score">${t.score}</div>
    </div>`;
  }).join('');
  // se a aba ja estiver visivel, anima; senao espera o switch
  if (document.getElementById('panel-times').classList.contains('active')) {
    requestAnimationFrame(runRace);
  }
}

function runRace(){
  const runners = document.querySelectorAll('#race .runner');
  runners.forEach((r, i) => {
    const pct = r.getAttribute('data-pct');
    setTimeout(() => { r.style.width = pct + '%'; }, 80 * i);
  });
  _raceAnimated = true;
}
function resetRace(){
  document.querySelectorAll('#race .runner').forEach(r => r.style.width = '0');
  _raceAnimated = false;
}

function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab === 'times') {
    resetRace();
    requestAnimationFrame(() => requestAnimationFrame(runRace));
  }
}

// Espera um array de { categoria, nome, pontos } (uma linha por ação).
// Agrupa por categoria, soma quem se repete e ordena tudo do maior pro menor.
// Mostra UMA categoria por vez, selecionável pelos chips de filtro no topo.
let _catGrupos = [];      // [{cat, pessoas, total}]
let _catAtiva = null;     // nome da categoria selecionada

function renderCategorias(lista){
  const box = document.getElementById('cat-body');
  const filtros = document.getElementById('cat-filters');
  if (!Array.isArray(lista) || lista.length === 0){
    filtros.innerHTML = '';
    box.innerHTML = '<div class="cat-empty">As pontuações por categoria aparecerão aqui assim que forem registradas.</div>';
    return;
  }
  const grupos = new Map();
  for (const item of lista){
    const cat = String(item.categoria || item.category || 'Sem categoria').trim() || 'Sem categoria';
    const nome = String(item.nome || item.name || '').trim();
    const pontos = Number(item.pontos ?? item.score) || 0;
    if (!nome) continue;
    if (!grupos.has(cat)) grupos.set(cat, new Map());
    const pessoas = grupos.get(cat);
    const k = idChave(nome);
    if (!pessoas.has(k)) pessoas.set(k, { nome, pontos: 0 });
    const acc = pessoas.get(k);
    acc.pontos += pontos;
    if (String(nome).trim().split(/\s+/).length > String(acc.nome).trim().split(/\s+/).length) acc.nome = nome;
  }
  // monta lista ordenada de categorias (pelo total da categoria, desc)
  _catGrupos = Array.from(grupos.entries()).map(([cat, pessoasMap]) => {
    const pessoas = Array.from(pessoasMap.values()).sort((a,b)=>b.pontos-a.pontos);
    const total = pessoas.reduce((s,p)=>s+p.pontos,0);
    return { cat, pessoas, total };
  }).sort((a,b)=> b.total - a.total);

  // mantem a categoria ativa se ainda existir; senao pega a primeira
  if (!_catAtiva || !_catGrupos.some(g=>g.cat===_catAtiva)) {
    _catAtiva = _catGrupos.length ? _catGrupos[0].cat : null;
  }

  // chips de filtro
  filtros.innerHTML = _catGrupos.map(g => `
    <button class="cat-chip${g.cat===_catAtiva?' active':''}" onclick="selecionarCategoria(${JSON.stringify(g.cat).replace(/"/g,'&quot;')})">
      ${g.cat}<span class="cat-chip-count">${g.pessoas.length}</span>
    </button>`).join('');

  renderCatBody();
}

function renderCatBody(){
  const box = document.getElementById('cat-body');
  const g = _catGrupos.find(x => x.cat === _catAtiva);
  if (!g){ box.innerHTML = ''; return; }
  box.innerHTML = `
    <div class="cat-card">
      <div class="cat-head">
        <span class="cat-title">${g.cat}</span>
        <span class="cat-count">${g.pessoas.length} ${g.pessoas.length===1?'pessoa':'pessoas'} · ${g.total} pts</span>
      </div>
      <div class="cat-list">
        ${g.pessoas.map((p,i)=>`
          <div class="cat-row">
            <span class="cat-pos">${i+1}</span>
            <div class="cat-name-wrap">
              <div class="cat-avatar">${avatarHTML(p.nome)}</div>
              <span class="cat-name">${titleCase(p.nome)}</span>
            </div>
            <span class="cat-score">${p.pontos} pts</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function selecionarCategoria(cat){
  _catAtiva = cat;
  const chips = document.querySelectorAll('#cat-filters .cat-chip');
  chips.forEach((c, i) => c.classList.toggle('active', _catGrupos[i] && _catGrupos[i].cat === cat));
  renderCatBody();
}

// chave de identidade: nome sem acento, minusculo, espacos normalizados.
// MANTÉM dígitos (senão "ADM 1" e "ADM 2" colidiriam).
function idChave(nome){
  return String(nome).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^A-Za-z0-9 ]/g,' ').toLowerCase().replace(/\s+/g,' ').trim();
}
// soma pontos de entradas repetidas da mesma pessoa/time (ignora maiusc/acentos)
// mantem a grafia mais completa do nome e o grupo da entrada de maior score
function consolidar(lista){
  const mapa = new Map();
  for (const item of lista){
    const k = idChave(item.name);
    if (!mapa.has(k)){
      mapa.set(k, Object.assign({}, item));
    } else {
      const acc = mapa.get(k);
      acc.score += item.score;
      // nome: fica com a versao que tem mais palavras (mais completa)
      const np = String(item.name).trim().split(/\s+/).length;
      const ap = String(acc.name).trim().split(/\s+/).length;
      if (np > ap) acc.name = item.name;
      // grupo/membros: mantem o do registro original de maior score individual
      if (item.score > (acc._maxUnit || 0)){ acc._maxUnit = item.score; if (item.group) acc.group = item.group; }
    }
  }
  const out = Array.from(mapa.values());
  out.forEach(o => { delete o._maxUnit; });
  out.sort((a,b) => b.score - a.score);
  return out;
}
